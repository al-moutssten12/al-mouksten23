<style>
:root{
  /* ===== ألوان أساسية ===== */
  --bg-white:#FFFFFF;
  --card-bg:#F9F9F9;
  --card-border:#E0E0E0;
  --text-dark:#1C1C1C;
  --heading:#2C2C2C;
  --btn-primary:linear-gradient(135deg,#BFA36C,#D4B873);
  --btn-hover:linear-gradient(135deg,#D4B873,#BFA36C);
  --success:#27AE60;
  --building:#2980B9;
  --pending:#C0392B;
  --shadow:0 8px 25px rgba(0,0,0,0.08);
  --shadow-glow:0 12px 35px rgb(160, 117, 31);
}

/* ===== GLOBAL ===== */

*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo','Segoe UI',Tahoma,sans-serif;}
body{background:var(--bg-white);color:var(--text-dark);direction:rtl;overflow-x:hidden;}
::-webkit-scrollbar{width:8px;}
::-webkit-scrollbar-thumb{background:#BFA36C;border-radius:10px;}

/* ===== HEADER ===== */

header{
  position: fixed;
  top: 0;
  width: 100%;
  background:#fff;
  border-bottom:1px solid rgba(191,163,108,0.35);
  box-shadow: 0 20px 20px rgba(0,0,0,0.12);
  z-index: 3000;
}
.header-top-line{
  position: fixed;
  top: 0;
  left: 0; /* نبدأ من اليسار */
  height: 4px;
  background:#BFA36C;
  width: 0%; /* الطول يبدأ 0% */
  transform-origin: left; /* نقطة التمدد من اليسار */
  z-index: 9999;
  transition: width 0.1s ease;
}
.header-container{display:flex;justify-content:space-between;align-items:center;padding:20px 60px;}
header h1{font-size:28px;font-weight:900;color:#BFA36C;letter-spacing:2px;}
nav{display:flex;align-items:center;gap:28px;}
nav a{font-size:15px;font-weight:600;color:var(--text-dark);text-decoration:none;position:relative;padding-bottom:6px;transition:.3s;}
nav a::after{content:"";position:absolute;bottom:0;right:0;width:0;height:2px;background:#BFA36C;transition:.35s;}
nav a:hover{color:#BFA36C;}
nav a:hover::after{width:100%;}

/* ===== MAIN ===== */
main{padding:140px 24px 60px;max-width:1200px;margin:auto;}

/* ===== CONTROLS ===== */
.controls{display:flex;justify-content:space-between;gap:12px;margin-bottom:22px;flex-wrap:wrap;}
.controls input, .controls select{
  background:var(--card-bg);
  border:1px solid #DDD;
  padding:12px 16px;
  border-radius:16px;
  color:var(--text-dark);
  min-width:220px;
  transition:.3s;
}
.controls input:focus, .controls select:focus{
  border-color:#BFA36C;
  outline:none;
  box-shadow:0 0 12px rgba(191,163,108,0.2);
}

/* ===== BUTTONS ===== */
.btn{
  padding:12px 20px;border-radius:20px;border:none;font-weight:700;cursor:pointer;
  background:var(--btn-primary);
  color:var(--bg-white);
  box-shadow:var(--shadow-glow);
  transition:.35s;
}
.btn:hover{
  background:var(--btn-hover);
  transform:translateY(-2px);
  box-shadow:0 14px 36px rgba(191,163,108,0.35);
}

/* ===== GRID ===== */
#kitchenCards{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:28px;
}

/* ===== CARD ===== */
.card{
  background:var(--card-bg);
  border-radius:24px;
  padding:24px;
  border:1px solid var(--card-border);
  box-shadow:var(--shadow);
  transition:.35s;
  position:relative;
}
.card:hover{transform:translateY(-6px);box-shadow:var(--shadow-glow);}
.card h3{font-size:14px;font-weight:900;color:var(--heading);margin-bottom:12px;}
.meta{color:#777;font-size:14px;}

.badge{
  position:absolute;
  top:16px;
  right:16px;
  padding:7px 16px;
  border-radius:24px;
  font-size:13px;
  font-weight:800;
  letter-spacing:0.3px;
}
.badge.pending{
  background:rgba(192,57,43,0.12);
  border:1px solid #C0392B;
  color:#C0392B;
}
.badge.building{
  background:rgba(41,128,185,0.12);
  border:1px solid #2980B9;
  color:#2980B9;
}
.badge.done{
  background:rgba(39,174,96,0.12);
  border:1px solid #27AE60;
  color:#27AE60;
}

/* ===== CARD ACTIONS ===== */
.card .actions{display:flex;gap:12px;margin-top:20px;}
.card .actions button{
  flex:1;padding:10px;border-radius:16px;border:1px solid #DDD;background:var(--card-bg);font-weight:700;cursor:pointer;color:var(--text-dark);transition:.3s;
}
.card .actions button:hover{border-color:#BFA36C;color:#BFA36C;box-shadow:0 10px 25px rgba(191,163,108,0.15);}

/* ===== MODAL ===== */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  backdrop-filter: blur(6px);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
  padding:24px;
  animation: fadeIn .3s ease;
}
.modal.show{display:flex;}

@keyframes fadeIn{ from{opacity:0} to{opacity:1} }

/* ===== MODAL BOX ===== */
.modal-box{
  background:linear-gradient(180deg,#ffffff,#fbfbfb);
  border-radius:18px;
  padding:28px 30px;
  max-width:820px;
  width:100%;
  max-height:90vh;
  overflow:auto;
  box-shadow:0 30px 80px rgba(18,18,18,0.25);
  animation: slideUp .35s ease;
  position:relative;
  border:1px solid rgba(191,163,108,0.08);
}

@keyframes slideUp{ from{transform:translateY(40px);opacity:0} to{transform:translateY(0);opacity:1} }
.modal .close{ position:absolute; top:18px; left:18px; width:44px; height:44px; border-radius:50%; border:none; background:#111; color:#fff; font-size:18px; font-weight:900; cursor:pointer; transition:.3s;}
.modal .close:hover{ background:#BFA36C; color:#fff; transform:rotate(90deg); }
.modal-box h2{ font-size:20px; font-weight:900; color:#2C2C2C; margin-bottom:18px; }
.modal .grid{ display:grid; grid-template-columns: 1fr 1fr; gap:12px 18px; }

.modal label{ font-size:13px; font-weight:700; color:#555; margin-bottom:6px; display:block; }
.modal input, .modal textarea, .modal select{ width:100%; padding:12px 14px; border-radius:12px; border:1px solid #E8E8E8; background:#fff; transition:.2s; }
.modal textarea{ min-height:90px; resize:vertical; }
.modal input:focus, .modal textarea:focus, .modal select:focus{ outline:none; border-color:#BFA36C; box-shadow:0 6px 20px rgba(191,163,108,0.12); }

.readonly-list{ background:linear-gradient(180deg,#fff,#fcfcfc); border-radius:10px; padding:12px; border:1px solid #f0f0f0; min-height:46px; color:#333; }
.readonly-list div{ padding:6px 0; border-bottom:1px dashed #eee; }
.readonly-list div:last-child{ border-bottom:none; }

/* ===== MODAL ACTIONS ===== */
.modal-actions{ display:flex; align-items:center; gap:12px; margin-top:20px; padding-top:10px; border-top:1px solid #f3f3f3; }
.modal-actions .spacer{ flex:1 }
.btn.gold{ background:linear-gradient(135deg,#BFA36C,#D4B873); color:#fff; }
.btn.gray{ background:#e0e0e0; color:#333; }
.btn.danger{ background:#C0392B; color:#fff; }
.btn.gold:hover, .btn.gray:hover, .btn.danger:hover{ transform:translateY(-2px); box-shadow:0 10px 30px rgba(0,0,0,.12); }

/* ===== EMPTY STATE ===== */
.empty{text-align:center;padding:28px;color:#555;background:#F0F0F2;border-radius:24px;border:1px dashed #DDD;font-weight:700;}

/* ===== RESPONSIVE ===== */
@media(max-width:900px){ .header-container{padding:16px 20px;} main{padding-top:160px;} #kitchenCards{gap:20px;} .modal .grid{ grid-template-columns: 1fr; } }

.card .price { margin-top:8px; color: var(--heading); font-size:18px; font-weight:900; letter-spacing:0.5px; }

/* ===== Additional styles for text-buttons and image preview/lightbox ===== */
.btn-text {
  background: none;
  border: none;
  color: #1C1C1C;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  position: relative;
  padding: 6px 8px;
  transition: color 0.25s ease;
}
.btn-text::after {
  content: '';
  position: absolute;
  left: 0;
  bottom: -2px;
  height: 2px;
  width: 0;
  background: linear-gradient(90deg,#BFA36C,#D4B873);
  transition: width 0.35s ease;
}
.btn-text:hover { color: #BFA36C; }
.btn-text:hover::after { width: 100%; }

/* make modal action buttons appear as text links */
.modal-actions{ align-items:center; gap:16px; }
.modal-actions .spacer{ flex:1 }

/* hide visible scrollbars (still allow scrolling) */
html, body, .modal { -ms-overflow-style: none; scrollbar-width: none; }
html::-webkit-scrollbar, body::-webkit-scrollbar, .modal::-webkit-scrollbar { display: none; }

/* archive button underline red */
.btn-text.archive::after { background: linear-gradient(90deg,#e74c3c,#c0392b); }
.btn-text.archive:hover { color: #c0392b; }

/* النافذة */
.modal {
  overflow: hidden !important;
}

/* محتوى النافذة */
.modal-content,
.modal-body {
  overflow: hidden !important;
  max-height: 100vh;
}

/* إخفاء الشريط نهائياً */
.modal *::-webkit-scrollbar {
  width: 0 !important;
  height: 0 !important;
  display: none;
}

.modal * {
  scrollbar-width: none !important; /* Firefox */
}



/* زر الأدمن كأيقونة */
.admin-btn {
  display:flex;

}

   padding:10px 12px;

}

.popup-actions.extra{

.btn-print,

.scroll-progress {

/* ================= ADMIN MODAL ================= */
/* تنسيق نافذة الأدمن المنبثقة بالكامل */

/* ===== خلفية النافذة (التعتيم) ===== */
#adminModal {
  position: fixed;              /* تثبيت العنصر فوق الصفحة ولا يتحرك مع السك롤 */
  inset: 0;                     /* top/right/bottom/left = 0 → يملأ الشاشة */
  background: rgba(0,0,0,0.45); /* لون أسود شفاف لتعتيم الخلفية */
  backdrop-filter: blur(6px);   /* ضبابية لما خلف النافذة */
  display: none;                /* إخفاء النافذة افتراضياً */
  justify-content: center;      /* توسيط المحتوى أفقياً */
  align-items: center;          /* توسيط المحتوى عمودياً */
  z-index: 9999;                /* ضمان ظهورها فوق كل العناصر */
  padding: 24px;                /* مسافة من أطراف الشاشة */
  animation: fadeIn 0.3s ease;  /* حركة ظهور تدريجية */
}

/* عند إضافة class show يتم إظهار النافذة */
#adminModal.show {
  display: flex;                /* تفعيل flex لإظهارها */
}

/* ===== صندوق النافذة الأبيض ===== */
#adminModal .modal-box {
  background: linear-gradient(180deg,#ffffff,#fbfbfb); /* خلفية متدرجة */
  border-radius: 18px;          /* تدوير الزوايا */
  padding: 28px 30px;           /* مسافة داخلية */
  max-width: 420px;             /* أقصى عرض للصندوق */
  width: 100%;                  /* عرض مرن حسب الشاشة */
  text-align: right;            /* محاذاة النص لليمين (عربي) */
  position: relative;           /* للسماح بوضع زر الإغلاق داخله */
  border: 1px solid rgba(191,163,108,0.08); /* إطار خفيف */
  box-shadow: 0 30px 80px rgba(18,18,18,0.25); /* ظل للصندوق */
  animation: slideUp 0.35s ease; /* حركة صعود عند الظهور */
}

/* ===== عنوان النافذة ===== */
#adminModal .modal-box h2 {
  font-size: 20px;              /* حجم الخط */
  font-weight: 900;             /* سماكة الخط */
  color: #BFA36C;               /* لون ذهبي */
  margin-bottom: 18px;          /* مسافة أسفل العنوان */
}

/* ===== زر الإغلاق (X) ===== */
#adminModal .close {
  position: absolute;           /* وضعه داخل الصندوق بشكل حر */
  top: 18px;                    /* من الأعلى */
  right: 355px;                  /* من اليمين */
  width: 44px;                  /* عرض الزر */
  height: 44px;                 /* ارتفاع الزر */
  border-radius: 50%;           /* جعله دائري */
  border: none;                 /* إزالة الإطار */
  background: linear-gradient(135deg,#000000,#000000); /* تدرج ذهبي */
  color: #fff;                  /* لون النص أبيض */
  font-size: 24px;              /* حجم رمز X */
  font-weight: 700;             /* سماكة الرمز */
  cursor: pointer;              /* شكل يد عند المرور */
  display: flex;                /* لتوسيط الرمز */
  align-items: center;          /* توسيط عمودي */
  justify-content: center;      /* توسيط أفقي */
  line-height: 1;               /* ضبط ارتفاع السطر */
  transition: transform 0.3s, background 0.3s; /* حركة ناعمة */
}

/* تأثير عند المرور على زر الإغلاق */
#adminModal .close:hover {
  background: linear-gradient(135deg,#D4B873,#BFA36C); /* عكس التدرج */
  transform: scale(1.1);        /* تكبير خفيف */
}

/* ===== حقول الإدخال ===== */
#adminModal input {
  width: 100% !important;
  height: 46px !important;
  padding: 0 14px !important;
  border-radius: 12px !important;
  border: 1px solid #E8E8E8 !important;
  background: #fff !important;
  font-family: 'Tajawal','Segoe UI',Tahoma,sans-serif !important;
  font-size: 14px !important;
  box-sizing: border-box !important;
  margin-top: 10px !important;
  transition: 0.25s !important;
}

/* عند التركيز على الحقل */
#adminModal input:focus {
  outline: none;                /* إزالة الإطار الأزرق الافتراضي */
  border-color: #BFA36C;        /* إطار ذهبي */
  box-shadow: 0 6px 20px rgba(191,163,108,0.12); /* ظل خفيف */
}

/* ===== منطقة الأزرار ===== */
#adminModal .modal-actions {
  display: flex;                /* ترتيب الأزرار أفقياً */
  align-items: center;          /* محاذاة عمودية */
  gap: 12px;                    /* مسافة بين الأزرار */
  margin-top: 20px;             /* مسافة أعلى */
  padding-top: 12px;            /* مسافة داخلية أعلى */
  border-top: 1px solid #f3f3f3;/* خط فاصل */
}

/* عنصر فارغ لدفع الأزرار */
#adminModal .modal-actions .spacer {
  flex: 1;                      /* يأخذ المساحة الفارغة */
}

/* ===== زر عام ===== */
#adminModal .btn {
  padding: 10px 20px;           /* حجم الزر */
  border-radius: 12px;          /* تدوير الزوايا */
  border: none;                 /* بدون إطار */
  font-weight: 700;             /* خط عريض */
  cursor: pointer;              /* يد عند المرور */
  transition: 0.35s;            /* حركة ناعمة */
}

/* زر ذهبي */
#adminModal .btn.gold {
  background: linear-gradient(135deg,#BFA36C,#D4B873);
  color: #fff;
}

/* زر رمادي */
#adminModal .btn.gray {
  background: #e0e0e0;
  color: #333;
}

/* تأثير المرور على الأزرار */
#adminModal .btn:hover {
  transform: translateY(-2px);  /* ارتفاع بسيط */
  box-shadow: 0 10px 30px rgba(0,0,0,.12); /* ظل */
}

/* ===== رسالة الخطأ ===== */
#adminMsg {
  margin-top: 12px;             /* مسافة من الأعلى */
  font-size: 14px;              /* حجم الخط */
  color: #C0392B;               /* لون أحمر */
  font-weight: 700;             /* خط عريض */
}

/* ===== الحركات ===== */
@keyframes fadeIn {
  from { opacity: 0; }          /* بداية شفافة */
  to   { opacity: 1; }          /* نهاية ظاهرة */
}

@keyframes slideUp {
  from { transform: translateY(40px); opacity: 0; } /* من أسفل */
  to   { transform: translateY(0); opacity: 1; }    /* للمكان الطبيعي */
}

/* ===== إخفاء شريط التمرير ===== */
#adminModal,
#adminModal * {
  scrollbar-width: none;        /* إخفاء السك롤 في فايرفوكس */
}

function el(tag, attrs = {}, ...children){
  const e = document.createElement(tag);
  for(const k in attrs){
    if(k === 'class') e.className = attrs[k];
    else if(k === 'html') e.innerHTML = attrs[k];
    else if(k.startsWith('on') && typeof attrs[k] === 'function') e.addEventListener(k.slice(2), attrs[k]);
    else e.setAttribute(k, attrs[k]);
  }
  children.flat().forEach(c => { if(typeof c === 'string') e.appendChild(document.createTextNode(c)); else if(c instanceof Node) e.appendChild(c); });
  return e;
}
function debounce(fn, wait=250){ let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a), wait); }; }

function buildCard(docId, k){

  if(status === 'قيد الإنشاء') badgeClass = 'building';
  else if(status === 'تم التسليم') badgeClass = 'done';

  });

  const leftDiv = el('div',{style:'flex:1'});

  const phone = el('p',{}, el('strong',{}, 'الهاتف: '), ' ', k.clientPhone || '-');
  const note = el('p',{}, k.notes ? k.notes : '-');

  const metaText = [];
  if(k.floors && k.floors.length) metaText.push(`${k.floors.length} طابق`);
  if(k.materials && k.materials.length) metaText.push(`${k.materials.length} مادة`);
  if(k.extras && k.extras.length) metaText.push(`${k.extras.length} إضافة`);

  const meta = el('p',{class:'meta'}, metaText.join(' • '));
  leftDiv.append(title, phone, note, meta);

  const priceText =
    (k.totalAmount && Number(k.totalAmount) > 0)

  const priceEl = el('p',{class:'meta price'}, priceText);

  const detailBtn = el(
    'button',
    {

    'تفاصيل'
  );
const printBtn = el(

      e.stopPropagation();
      printKitchenCard(docId);

      border: none;
      width: 40px;
      height: 40px;

);

async function printKitchenCard(docOrK) {
  let k = docOrK;
  try {
    if (typeof docOrK === 'string') {
      const snap = await getDoc(doc(db, 'kitchens', docOrK));
      if (!snap.exists()) {
        alert('البيانات غير موجودة للطباعة');
        return;
      }
      k = snap.data();
    }
  } catch (err) {
    console.error('خطأ في جلب البيانات للطباعة:', err);
    alert('فشل جلب بيانات الطباعة (راجع Console)');
    return;
  }

  const getWoodName = (w) => {
    if (!w && w !== 0) return null;
    if (typeof w === 'string') return w;
    if (typeof w === 'object' && w !== null) return w.name || w.displayName || w.label || null;
    return null;
  };

  const possibleGlobalKeys = ['woodType', 'wood', 'woodName', 'selectedWood', 'selectedWoodName', 'globalWood'];
  let globalWood = null;
  for (const key of possibleGlobalKeys) {
    if (k[key]) {
      globalWood = getWoodName(k[key]);
      if (globalWood) break;
    }
  }

  const floors = Array.isArray(k.floors) ? k.floors.map(f => {
    const floorWood = getWoodName(f.woodType) || getWoodName(f.wood) || globalWood || 'غير محدد';
    return { ...f, _woodName: floorWood };
  }) : [];

  const printContainer = document.createElement('div');
  printContainer.style.position = 'fixed';
  printContainer.style.left = '-10000px';

  printContainer.innerHTML = `
  <div style="
    direction:rtl;
    font-family:Arial, sans-serif;
    width:210mm;
    min-height:297mm;
    padding:20mm;
    box-sizing:border-box;
    position:relative;
  ">
    <!-- الهيدر -->
    <div style="display:flex; justify-content:space-between; align-items:flex-start; border-bottom:4px solid gold; padding-bottom:10px;">
      <div style="font-size:14px; line-height:1.8; text-align:left;">
        <div>📞 07802255624</div>
        <div>📞 0782888690</div>
      </div>
      <div style="text-align:center; flex:1;">
        <div style="font-size:30px; font-weight:bold;">
          شركة <span style="font-size:44px; font-weight:900; color:#D4AF37;">المقسطين </span>
          للديكور والتجارة العامة
        </div>
        <div style="font-size:14px; margin-top:6px; color:#555;">
          مطابخ تركية - اكسسوارات - خشب - ألواح فوم - إنارة كهربائيات - جميع أنواع العدد - بديل الخام - بديل الخشب - واجهات فوم - جبس بورد - تصميم - تنفيذ - إشراف
        </div>
        <div style="height:4px; background:gold; margin-top:8px;"></div>
        <div style="margin-top:6px; font-size:14px;">
          📍 النجف الأشرف - خدمي العدالة مقابل المدينة المائية - بعد شارع المستوصف
        </div>
      </div>
    </div>

    <!-- معلومات الزبون -->
    <div style="margin-top:20px; font-size:14px;">
      <div><b>اسم الزبون:</b> ${k.clientName || '-'}</div>
      <div><b>رقم الهاتف:</b> ${k.clientPhone || '-'}</div>
    </div>

    <!-- نوع الخشب لكل طابق -->
    ${floors.length ? `
      <div style="margin-top:15px; font-size:14px;">
        <b>نوع الخشب   :</b>
        <ul>
          ${floors.map(f => `<li>${f.name || '-'} : ${f._woodName}</li>`).join('')}
        </ul>
      </div>
    ` : ''}

    <!-- جدول الطوابق -->
    ${floors.length ? `
      <table style="width:100%; border-collapse:collapse; margin-top:10px;">
        <thead style="background:gold; color:#fff;">
          <tr>
            <th style="border:1px solid #ccc; padding:8px;">عدد الطوابق </th>
            <th style="border:1px solid #ccc; padding:8px;">نوع الخشب</th>
            <th style="border:1px solid #ccc; padding:8px;">L (م)</th>
            <th style="border:1px solid #ccc; padding:8px;">W (م)</th>
            <th style="border:1px solid #ccc; padding:8px;">H (م)</th>
          </tr>
        </thead>
        <tbody>
          ${floors.map(f => `
            <tr style="text-align:center;">
              <td style="border:1px solid #ccc;">${f.name || '-'}</td>
              <td style="border:1px solid #ccc; font-weight:bold;">${f._woodName}</td>
              <td style="border:1px solid #ccc;">${f.L || '-'} م</td>
              <td style="border:1px solid #ccc;">${f.W || '-'} م</td>
              <td style="border:1px solid #ccc;">${f.H || '-'} م</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    ` : ''}

    ${k.extras?.length ? `
      <h3 style="margin-top:20px; color:#D4AF37;">الإضافات</h3>
      <ul>${k.extras.map(e => `<li>${e.name} : ${e.value} م</li>`).join('')}</ul>
    ` : ''}

    ${k.materials?.length ? `
      <h3 style="margin-top:15px; color:#D4AF37;">المتيريل</h3>
      <ul>${k.materials.map(m => `<li>${m.name} × ${m.qty}</li>`).join('')}</ul>
    ` : ''}

    <!-- المجموع -->
    <div style="margin-top:20px; font-size:16px; font-weight:bold;">
      المجموع: ${k.totalAmount ? Number(k.totalAmount).toLocaleString() + ' د.ع' : (k.totalText || '-')}
    </div>
<br>

function renderReadonlyList(container, list, type){
  container.innerHTML = '';

  if(!Array.isArray(list) || list.length === 0){
    container.textContent = '—';
    return;
  }

  list.forEach(item => {
    const div = document.createElement('div');

    if(type === 'floors'){
      div.innerHTML = `
        <strong>${item.name || '-'}</strong>
        <br>
         : <b>${item.woodType ?? '  '}</b>
        <br>
        L: ${item.L ?? '-'} م
        &nbsp; W: ${item.W ?? '-'} م
        &nbsp; H: ${item.H ?? '-'} م
      `;
    }

    else if(type === 'extras'){
      div.textContent = `${item.name || '-'}: ${item.value || '-'}`;
    }

    else if(type === 'materials'){
      div.textContent = `${item.name || '-'} × ${item.qty || '-'}`;
    }

    container.appendChild(div);
  });
}

const kitchensCol = collection(db, 'kitchens');

function renderSnapshot(snapshot){
  lastSnapshot = snapshot;
  const docs = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
  applyClientFilterAndRender(docs);
}

onSnapshot(qKitchens, snapshot => { try { renderSnapshot(snapshot); } catch (err) { console.error(err); kitchenCards.innerHTML = `<div class="empty">حدث خطأ أثناء عرض البيانات</div>`; } }, err=>{ console.error('onSnapshot error',err); kitchenCards.innerHTML = `<div class="empty">خطأ في جلب البيانات: ${err.message}</div>`; });

function applyClientFilterAndRender(items){
  if(!kitchenCards) return;
  const s = (searchInput?.value || '').trim().toLowerCase();
  const statusVal = statusFilter?.value || '';
  let filtered = items.filter(i=>{ if(statusVal && (i.status||'') !== statusVal) return false; if(!s) return true; const hay = `${i.clientName||''} ${i.clientPhone||''} ${i.notes||''}`.toLowerCase(); return hay.includes(s); });

  const sortVal = sortBy?.value || 'createdAt_desc';
  if(sortVal === 'createdAt_desc') filtered.sort((a,b)=> (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
  else if(sortVal === 'createdAt_asc') filtered.sort((a,b)=> (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0));
  else if(sortVal === 'clientName_asc') filtered.sort((a,b)=> (a.clientName||'').localeCompare(b.clientName||''));
  else if(sortVal === 'clientName_desc') filtered.sort((a,b)=> (b.clientName||'').localeCompare(a.clientName||''));

  // counts
  const total = items.length;
  const delivered = items.filter(x=> (x.status || '') === 'تم التسليم').length;
  const building = items.filter(x=> (x.status || '') === 'قيد الإنشاء').length;
  const pending = items.filter(x=> (x.status || '') === 'غير متفق عليه').length;
  if(counts) counts.innerText = `الكل: ${total} • تسليم: ${delivered} • قيد: ${building} • غير متفق: ${pending}`;

  kitchenCards.innerHTML = '';
  if(filtered.length === 0){ emptyState.style.display = 'block'; }
  else { emptyState.style.display = 'none'; filtered.forEach(item => { try{ kitchenCards.appendChild(buildCard(item.id,item)); }catch(e){ console.error('card build error',e); } }); }
}

// image helpers: upload, render thumbnails, delete from Firestore (does not remove from storage)
async function uploadAndSaveFiles(files){
  if(!currentId){ alert('لا يوجد مطبخ محدد لحفظ الصور'); return; }
  if(!files || files.length===0) return;
  try{
    const storageMod = await import('https://www.gstatic.com/firebasejs/12.8.0/firebase-storage.js');
    const { ref, uploadBytes, getDownloadURL } = storageMod;
    for(const f of Array.from(files)){
      const safeName = f.name.split(' ').join('_');
      const path = `kitchens/${currentId}/images/${Date.now()}_${safeName}`;
      const stRef = ref(storage, path);
      await uploadBytes(stRef, f);
      const url = await getDownloadURL(stRef);
      await updateDoc(doc(db,'kitchens',currentId), { images: arrayUnion(url) });
    }
    const snap = await getDoc(doc(db,'kitchens',currentId));
    const d = snap.exists() ? snap.data() : {};
    renderImagesGridFromArray(d.images || []);
  }catch(err){ console.error('upload error',err); alert('فشل رفع الصورة: '+(err.message||err)); }
}

function renderImagesGridFromArray(images){
  if(!imagesGrid) return;
  imagesGrid.innerHTML = '';
  if(!images || !images.length){ imagesGrid.innerHTML = '<em>—</em>'; return; }
  images.forEach(url=>{
    const wrap = document.createElement('div'); wrap.className = 'thumb';
    const img = document.createElement('img'); img.src = url; img.alt = 'صورة مرفقة'; img.loading = 'lazy'; img.style.width='80px'; img.style.height='80px'; img.style.objectFit='cover'; img.style.borderRadius='8px';
    const del = document.createElement('button'); del.className='del'; del.textContent='✕';
    del.addEventListener('click', async (e)=>{
      e.stopPropagation();
      if(!confirm('هل تريد حذف هذه الصورة؟')) return;
      try{
        const snap = await getDoc(doc(db,'kitchens',currentId));
        const d = snap.exists() ? snap.data() : {};
        const imgs = (d.images||[]).filter(u=> u !== url);
        await updateDoc(doc(db,'kitchens',currentId), { images: imgs });
        renderImagesGridFromArray(imgs);
      }catch(err){ console.error('delete image error', err); alert('فشل حذف الصورة: '+(err.message||err)); }
    });
    img.addEventListener('click', ()=>{
      if(lightbox && lightboxImg){ lightboxImg.src = url; lightbox.classList.add('show'); lightbox.style.display='flex'; lightbox.setAttribute('aria-hidden','false'); }
    });
    wrap.appendChild(img); wrap.appendChild(del); imagesGrid.appendChild(wrap);
  });
}

// كلمة المرور الاحتياطية
const backupPass = "272311";

// دالة لضمان وجود مستند admin
async function ensureAdminDoc() {
    const docRef = doc(db,"config","admin");
    const snap = await getDoc(docRef);
    if(!snap.exists()){
        // إنشاء المستند مع كلمة المرور الاحتياطية
        await setDoc(docRef, { password: backupPass });
        return backupPass;
    }
    return snap.data().password || backupPass;
}

// دالة لجلب كلمة المرور من Firebase
async function getAdminPassword() {
    try {
        return await ensureAdminDoc();
    } catch(err) {
        console.error('Failed to get admin password', err);
        return backupPass;
    }
}

// فتح المودال
adminBtn.addEventListener('click', ()=> {

});

// تسجيل الدخول
adminLoginBtn.addEventListener('click', async ()=>{
    const pass = adminPasswordInput.value.trim();
    const savedPass = await getAdminPassword();
    if(pass === savedPass || pass === backupPass){
        adminModal.classList.remove('show');
        window.location.href = 'admin.html';
    } else {
        adminMsg.textContent = 'كلمة المرور غير صحيحة';
    }
