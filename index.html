<style>
/* ===== RESET ===== */
*{ margin:0; padding:0; box-sizing:border-box; }
body{ font-family:'Tajawal',Segoe UI,Tahoma,sans-serif; direction:rtl; overflow-x:hidden; background:#fff; color:#1C1C1C; }

/* ===== SCROLLBAR ===== */
body::-webkit-scrollbar{ width:0; background:transparent; }

/* ===== ROOT COLORS ===== */
:root{
  --gold:#BFA36C;
  --btn-primary:linear-gradient(135deg,#BFA36C,#D4B873);
  --btn-hover:linear-gradient(135deg,#D4B873,#BFA36C);
  --card-bg:#F9F9F9;
  --card-border:#E0E0E0;
  --text-dark:#1C1C1C;
  --heading:#2C2C2C;
  --shadow-glow:0 12px 35px rgb(160, 117, 31);
   --shadow:0 8px 25px rgba(0,0,0,0.08);
}


header{
  position: fixed;
  top: 0;
  width: 100%;
  background:#fff;
  border-bottom:1px solid rgba(191,163,108,0.35);
box-shadow: 0 20px 20px rgba(0,0,0,0.12);
z-index: 3000;

}

.header-container{display:flex;justify-content:space-between;align-items:center;padding:20px 60px;}
header h1{font-size:28px;font-weight:900;color:#BFA36C;letter-spacing:2px;}
nav{display:flex;align-items:center;gap:28px;}
nav a{font-size:15px;font-weight:600;color:var(--text-dark);text-decoration:none;position:relative;padding-bottom:6px;transition:.3s;}
nav a::after{content:"";position:absolute;bottom:0;right:0;width:0;height:2px;background:#BFA36C;transition:.35s;}
nav a:hover{color:#BFA36C;}
nav a:hover::after{width:100%;}


/* ===== ADMIN BUTTON ===== */
.admin-btn{ display:flex; align-items:center; justify-content:center; width:40px; height:40px; background:var(--btn-primary); border-radius:50%; color:#fff; cursor:pointer; transition: transform .3s, box-shadow .3s; }
.admin-btn:hover{ transform:scale(1.1); box-shadow:0 8px 20px rgba(191,163,108,0.4); }
.admin-btn svg{ width:22px; height:22px; }

/* ===== HERO ===== */
.hero{
  height:100vh;
  background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.4)), url("https://images.unsplash.com/photo-1600585154340-be6161a56a0c");
  background-size:cover;
  background-position:center;
  display:flex;
  align-items:center;
  padding:0 80px;
}
.hero-content{ max-width:700px; animation:fadeHero 2s ease; }
@keyframes fadeHero{ from{opacity:0;transform:translateY(40px)} to{opacity:1;transform:translateY(0)} }
.hero h1{ font-size:60px; line-height:1.2; color:var(--gold); }
.hero p{ margin-top:20px; font-size:18px; color:#1C1C1C; line-height:1.8; }
.hero button{ margin-top:40px; padding:16px 34px; font-size:16px; border:none; cursor:pointer; background:var(--btn-primary); color:#fff; transition:.4s; }
.hero button:hover{ background:var(--btn-hover); transform:translateY(-4px); box-shadow:var(--shadow-glow); }

/* ===== SECTIONS ===== */
section{ padding:120px 80px; }
.section-title{ text-align:center; margin-bottom:80px; }
.section-title h2{ font-size:42px; color:var(--gold); }
.section-title p{ color:#555; margin-top:15px; }

/* ===== SERVICES ===== */
.services{ display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:40px; }
.service-card{ background:var(--card-bg); border:1px solid var(--card-border); padding:50px 30px; text-align:center; transition:.5s; }
.service-card:hover{ transform:translateY(-10px); border-color:var(--gold); }
.service-card h3{ margin-top:20px; color:var(--heading); }
.service-card p{ margin-top:15px; color:var(--text-dark); line-height:1.7; }

/* ===== GALLERY ===== */
.gallery{ display:flex; flex-direction:column; gap:80px; }
.gallery-row{ display:flex; align-items:center; gap:60px; opacity:0; transform:translateY(40px); transition:0.8s ease; }
.gallery-row.reverse{ flex-direction:row-reverse; }
.gallery-row.show{ opacity:1; transform:translateY(0); }
.gallery-img{ width:45%; height:300px; overflow:hidden; border-radius:10px; }
.gallery-img img{ width:100%; height:100%; object-fit:cover; transition:.6s; cursor:pointer; }
.gallery-img:hover img{ transform:scale(1.1); filter:brightness(60%); }
.gallery-info{ width:45%; }
.gallery-info h3{ color:var(--gold); font-size:28px; margin-bottom:20px; }
.gallery-info .typing:not(h3){ color:#1C1C1C; }

/* ===== LIGHTBOX ===== */
.lightbox{ display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); justify-content:center; align-items:center; z-index:2000; }
.lightbox.show{ display:flex; }
.lightbox-img{ max-width:90%; max-height:90%; border-radius:10px; box-shadow:0 0 40px rgba(191,163,108,0.8); }
.lightbox .close{ position:absolute; top:20px; right:40px; font-size:50px; color:var(--gold); cursor:pointer; }

/* ===== CTA ===== */
.cta{ background:linear-gradient(120deg,#FFFFFF,#F9F9F9); text-align:center; }
.cta h2{ font-size:44px; color:var(--gold); }
.cta button{ margin-top:30px; padding:18px 40px; background:transparent; color:#fff; border:2px solid var(--gold); cursor:pointer; transition:.4s; }
.cta button:hover{ background:var(--gold); color:#fff; }

/* ===== FOOTER ===== */
footer{ background:#F9F9F9; padding:50px; text-align:center; border-top:1px solid #E0E0E0; }
footer p{ color:#555; font-size:14px; }

/* ===== ADMIN MODAL ===== */
.modal{ display:none; position:fixed; inset:0; justify-content:center; align-items:center; background:rgba(0,0,0,0.6); z-index:3000; }
.modal.show{ display:flex; }
.modal-box{ max-width:420px; background:#fff; padding:30px; border-radius:10px; text-align:right; position:relative; }
.modal-box h2{ margin-bottom:20px; color:var(--gold); }
.modal-box input{ width:100%; padding:10px 12px; border-radius:10px; border:1px solid #ddd; margin-top:6px; }
.modal-box .close{ position:absolute; top:15px; right:15px; font-size:30px; color:#BFA36C; cursor:pointer; }
.modal-box button{ padding:10px 18px; margin-left:8px; cursor:pointer; background:var(--btn-primary); color:#fff; border:none; border-radius:6px; transition:.3s; }
.modal-box button:hover{ background:var(--btn-hover); }
#adminMsg{ margin-top:12px; color:red; }

/* ===== PROGRESS BAR ===== */
#progress{ position:fixed; top:0; left:0; height:3px; background:var(--gold); width:0; z-index:2001; }

/* ===== ANIMATIONS ===== */
@keyframes fadeHero{ from{opacity:0;transform:translateY(40px)} to{opacity:1;transform:translateY(0)} }


/* زر الأدمن كأيقونة */
.admin-btn {
  display:flex;
  align-items:center;
  justify-content:center;
  width:40px;
  height:40px;
  background:linear-gradient(135deg,#BFA36C,#D4B873);
  border-radius:50%;
  color:#fff;
  transition: transform 0.3s, box-shadow 0.3s;
}

.admin-btn:hover {
  transform: scale(1.1);
  box-shadow: 0 8px 20px rgba(191,163,108,0.4);
}
.admin-btn svg {
  width:22px;
  height:22px;
}




#adminModal .modal-box input{
  width:100%; padding:10px 12px; border-radius:10px; border:1px solid #ddd; margin-top:6px;
}

#adminModal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45); /* خلفية مظللة شفافة */
  backdrop-filter: blur(6px);     /* تأثير ضبابي */
  display: none;                  /* مخفية افتراضياً */
  justify-content: center;
  align-items: center;
  z-index: 9999;
  padding: 24px;
  animation: fadeIn 0.3s ease;
}
#adminModal.show {
  display: flex;                  /* تظهر عند إضافة الكلاس show */
}
@keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
#adminModal .modal-box {
  background: linear-gradient(180deg,#ffffff,#fbfbfb);
  border-radius: 18px;
  padding: 28px 30px;
  max-width: 420px;
  width: 100%;
  text-align: right;
  box-shadow: 0 30px 80px rgba(18,18,18,0.25);
  animation: slideUp 0.35s ease;
  position: relative;
  border: 1px solid rgba(191,163,108,0.08);
}
@keyframes slideUp { from { transform: translateY(40px); opacity:0 } to { transform: translateY(0); opacity:1 } }
#adminModal .close {
  position: absolute;
  top: 18px;
  left: 18px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: none;
  background: #111;
  color: #fff;
  font-size: 18px;
  font-weight: 900;
  cursor: pointer;
  transition: .3s;
}
#adminModal .close:hover {
  background: #BFA36C;
  color: #fff;
  transform: rotate(90deg);
}
#adminModal input {
  width: 100%;
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  margin-top: 6px;
}
#adminModal .btn.gold {
  background: linear-gradient(135deg,#BFA36C,#D4B873);
  color: #fff;
}
#adminModal .btn.gray {
  background: #e0e0e0;
  color: #333;
}
#adminModal .btn.gold:hover, #adminModal .btn.gray:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 30px rgba(0,0,0,.12);
}



#adminModal .close:hover {
 background:#BFA36C; 
  color:#fff; 
  transform:rotate(90deg); 
}
.btn{
  padding:12px 20px;border-radius:20px;border:none;font-weight:700;cursor:pointer;
  background:var(--btn-primary);
  color:var(--bg-white);
  box-shadow:var(--shadow-glow);
  transition:.35s;
}
.btn:hover{
  background:var(--btn-hover);
  transform:translateY(-2px);
  box-shadow:0 14px 36px rgba(191,163,108,0.35);
}

/* ===== GRID ===== */
#kitchenCards{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:28px;
}

/* ===== CARD ===== */
.card{
  background:var(--card-bg);
  border-radius:24px;
  padding:24px;
  border:1px solid var(--card-border);
  box-shadow:var(--shadow);
  transition:.35s;
  position:relative;
}
.card:hover{transform:translateY(-6px);box-shadow:var(--shadow-glow);}
.card h3{font-size:14px;font-weight:900;color:var(--heading);margin-bottom:12px;}
.meta{color:#777;font-size:14px;}

.badge{
  position:absolute;
  top:16px;
  right:16px;
  padding:7px 16px;
  border-radius:24px;
  font-size:13px;
  font-weight:800;
  letter-spacing:0.3px;
}
.badge.pending{
  background:rgba(192,57,43,0.12);
  border:1px solid #C0392B;
  color:#C0392B;
}

.badge.building{
  background:rgba(41,128,185,0.12);
  border:1px solid #2980B9;
  color:#2980B9;
}

.badge.done{
  background:rgba(39,174,96,0.12);
  border:1px solid #27AE60;
  color:#27AE60;
}

/* ===== CARD ACTIONS ===== */
.card .actions{display:flex;gap:12px;margin-top:20px;}
.card .actions button{
  flex:1;padding:10px;border-radius:16px;border:1px solid #DDD;background:var(--card-bg);font-weight:700;cursor:pointer;color:var(--text-dark);transition:.3s;
}
.card .actions button:hover{border-color:#BFA36C;color:#BFA36C;box-shadow:0 10px 25px rgba(191,163,108,0.15);}

/* ===== MODAL ===== */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  backdrop-filter: blur(6px);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
  padding:24px;
  animation: fadeIn .3s ease;
}
.modal.show{display:flex;}

@keyframes fadeIn{ from{opacity:0} to{opacity:1} }

/* ===== MODAL BOX ===== */
.modal-box{
  background:linear-gradient(180deg,#ffffff,#fbfbfb);
  border-radius:18px;
  padding:28px 30px;
  max-width:820px;
  width:100%;
  max-height:90vh;
  overflow:auto;
  box-shadow:0 30px 80px rgba(18,18,18,0.25);
  animation: slideUp .35s ease;
  position:relative;
  border:1px solid rgba(191,163,108,0.08);
}

@keyframes slideUp{ from{transform:translateY(40px);opacity:0} to{transform:translateY(0);opacity:1} }
.modal .close{ position:absolute; top:18px; left:18px; width:44px; height:44px; border-radius:50%; border:none; background:#111; color:#fff; font-size:18px; font-weight:900; cursor:pointer; transition:.3s;}
.modal .close:hover{ background:#BFA36C; color:#fff; transform:rotate(90deg); }
.modal-box h2{ font-size:20px; font-weight:900; color:#2C2C2C; margin-bottom:18px; }
.modal .grid{ display:grid; grid-template-columns: 1fr 1fr; gap:12px 18px; }

.modal label{ font-size:13px; font-weight:700; color:#555; margin-bottom:6px; display:block; }
.modal input, .modal textarea, .modal select{ width:100%; padding:12px 14px; border-radius:12px; border:1px solid #E8E8E8; background:#fff; transition:.2s; }
.modal textarea{ min-height:90px; resize:vertical; }
.modal input:focus, .modal textarea:focus, .modal select:focus{ outline:none; border-color:#BFA36C; box-shadow:0 6px 20px rgba(191,163,108,0.12); }

.readonly-list{ background:linear-gradient(180deg,#fff,#fcfcfc); border-radius:10px; padding:12px; border:1px solid #f0f0f0; min-height:46px; color:#333; }
.readonly-list div{ padding:6px 0; border-bottom:1px dashed #eee; }
.readonly-list div:last-child{ border-bottom:none; }

/* ===== MODAL ACTIONS ===== */
.modal-actions{ display:flex; align-items:center; gap:12px; margin-top:20px; padding-top:10px; border-top:1px solid #f3f3f3; }
.modal-actions .spacer{ flex:1 }

.btn.danger{ background:#C0392B; color:#fff; }
.btn.gold:hover, .btn.gray:hover, .btn.danger:hover{ transform:translateY(-2px); box-shadow:0 10px 30px rgba(0,0,0,.12); }

/* ===== EMPTY STATE ===== */
.empty{text-align:center;padding:28px;color:#555;background:#F0F0F2;border-radius:24px;border:1px dashed #DDD;font-weight:700;}

/* ===== RESPONSIVE ===== */
@media(max-width:900px){ .header-container{padding:16px 20px;} main{padding-top:160px;} #kitchenCards{gap:20px;} .modal .grid{ grid-template-columns: 1fr; } }

.card .price { margin-top:8px; color: var(--heading); font-size:18px; font-weight:900; letter-spacing:0.5px; }



/* ===== Additional styles for text-buttons and image preview/lightbox ===== */
.btn-text {
  background: none;
  border: none;
  color: #1C1C1C;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  position: relative;
  padding: 6px 8px;
  transition: color 0.25s ease;
}
.btn-text::after {
  content: '';
  position: absolute;
  left: 0;
  bottom: -2px;
  height: 2px;
  width: 0;
  background: linear-gradient(90deg,#BFA36C,#D4B873);
  transition: width 0.35s ease;
}
.btn-text:hover { color: #BFA36C; }
.btn-text:hover::after { width: 100%; }

/* make modal action buttons appear as text links */
.modal-actions{ align-items:center; gap:16px; }
.modal-actions .spacer{ flex:1 }

/* archive button underline red */
.btn-text.archive::after { background: linear-gradient(90deg,#e74c3c,#c0392b); }
.btn-text.archive:hover { color: #c0392b; }

    el.textContent = "";
    el.dataset.typed="true";
    setTimeout(()=>{
      let i=0;

        if(i>=text.length) clearInterval(timer);
      },40);

// كلمة المرور الاحتياطية
const backupPass = "272311";

// دالة لضمان وجود مستند admin
async function ensureAdminDoc() {
    const docRef = doc(db,"config","admin");
    const snap = await getDoc(docRef);
    if(!snap.exists()){
        // إنشاء المستند مع كلمة المرور الاحتياطية
        await setDoc(docRef, { password: backupPass });
        return backupPass;
    }
    return snap.data().password || backupPass;
}

// دالة لجلب كلمة المرور من Firebase
async function getAdminPassword() {
    try {
        return await ensureAdminDoc();
    } catch(err) {
        console.error('Failed to get admin password', err);
        return backupPass;
    }
}

// فتح المودال
adminBtn.addEventListener('click', ()=> {
    adminModal.classList.add('show');
    adminStep1.style.display='block';
    adminStep2.style.display='none';
    adminStep3.style.display='none';
    adminMsg.textContent = '';
    adminPasswordInput.value='';
});

// إغلاق المودال
closeAdminModal.addEventListener('click', ()=> adminModal.classList.remove('show'));

// تسجيل الدخول
adminLoginBtn.addEventListener('click', async ()=>{
    const pass = adminPasswordInput.value.trim();
    const savedPass = await getAdminPassword();
    if(pass === savedPass || pass === backupPass){
        adminModal.classList.remove('show');
        window.location.href = 'admin.html';
    } else {
        adminMsg.textContent = 'كلمة المرور غير صحيحة';
    }
});

// تغيير كلمة المرور
adminChangeBtn.addEventListener('click', ()=>{
    adminStep1.style.display='none';
    adminStep2.style.display='block';
    adminStep3.style.display='none';
    adminPasswordInput.value='';
    adminMsg.textContent = '';
});

// تحقق كلمة المرور القديمة
verifyOldBtn.addEventListener('click', async ()=>{
    const oldPass = oldPasswordInput.value.trim();
    const savedPass = await getAdminPassword();
    if(oldPass === savedPass || oldPass === backupPass){
        adminStep2.style.display='none';
        adminStep3.style.display='block';
        oldPasswordInput.value='';
        adminMsg.textContent='';
    } else {
        adminMsg.textContent = 'كلمة المرور القديمة غير صحيحة';
    }
});

// حفظ كلمة المرور الجديدة
saveNewBtn.addEventListener('click', async ()=>{
    const newPass = newPasswordInput.value.trim();
    if(newPass.length < 4){
        adminMsg.textContent = 'كلمة المرور الجديدة يجب أن تكون 4 أحرف على الأقل';
        return;
    }
    try{
        const docRef = doc(db,"config","admin");
        await setDoc(docRef, { password: newPass }); // setDoc لإنشاء أو تعديل المستند
        adminMsg.style.color='green';
        adminMsg.textContent='تم تحديث كلمة المرور بنجاح';
        setTimeout(()=>{
            adminModal.classList.remove('show');
            adminMsg.style.color='red';
            adminStep1.style.display='block';
            adminStep2.style.display='none';
            adminStep3.style.display='none';
        },1200);
    }catch(err){
        console.error(err);
        adminMsg.textContent='فشل تحديث كلمة المرور';
    }
});





  
  window.addEventListener('scroll', function() {
  const scrollTop = window.scrollY;
  const docHeight = document.body.scrollHeight - window.innerHeight;
  const scrollPercent = (scrollTop / docHeight) * 100;
  document.querySelector('.scroll-progress').style.width = scrollPercent + '%';
});

</script>

</body>
</html>
